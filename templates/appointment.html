<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>

<style>
body{
font-family: Arial;
background-image: url("/static/appointbook.jpg"); 
background-size:cover;
background-position:center;
height:100vh;
display:flex;
align-items:center;
padding-left:80px;
}

.container{
width:400px;
margin:auto;
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px;
background:#1f6f8b;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">
<a href="/dashboard" style="text-decoration: none; font-size: 14px; color: #1f6f8b; display: block; margin-bottom: 15px;">
        🡨 Dashboard
    </a>
<h2>Book Appointment</h2>

<form method="POST">

<select name="doctor" required>
    <option value="">Select Department</option>
    <option value="Cardiology" {% if request.form.doctor == 'Cardiology' %}selected{% endif %}>Cardiology</option>
    <option value="Orthopedics" {% if request.form.doctor == 'Orthopedics' %}selected{% endif %}>Orthopedics</option>
    <option value="Neurology" {% if request.form.doctor == 'Neurology' %}selected{% endif %}>Neurology</option>
    <option value="Pediatrics" {% if request.form.doctor == 'Pediatrics' %}selected{% endif %}>Pediatrics</option>
</select>

<input type="date" name="date" id="appointment_date" value="{{ request.form.date }}" required>

<button type="submit">Check Available Slots</button>

</form>

{% if slots %}

<h3>Available Slots</h3>

<form method="POST" action="/book_slot">

<input type="hidden" name="doctor" value="{{ request.form.doctor }}">
<input type="hidden" name="date" value="{{ request.form.date }}">

<select name="time" required>
{% for slot in slots %}
<option value="{{ slot }}">{{ slot }}</option>
{% endfor %}
</select>

<button type="submit">Book Appointment</button>

</form>

{% endif %}

{% if message %}
<p>{{ message }}</p>
{% endif %}

</div>
    <script>
    const dateInput = document.getElementById('appointment_date');

    // 1. Disable past dates
    const today = new Date().toISOString().split('T')[0];
    dateInput.setAttribute('min', today);

    // 2. Disable Sundays
    dateInput.addEventListener('input', function(e) {
        const day = new Date(this.value).getUTCDay();
        if (day === 0) { // 0 is Sunday
            e.preventDefault();
            this.value = '';
            alert('Sorry, the hospital is closed on Sundays. Please select another date.');
        }
    });
</script>
</body>
</html>
